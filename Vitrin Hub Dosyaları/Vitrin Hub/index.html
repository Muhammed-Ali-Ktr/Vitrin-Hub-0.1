<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Showcase Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 class="logo">Showcase</h1>
      <button type="button" class="btn-back hidden" id="btnBack" aria-label="Geri dön">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        <span>Geri Dön</span>
      </button>
    </header>

    <main class="main">
      <section class="view view--sectors" id="viewSectors" aria-label="Sektörler">
        <div class="glass-panel glass-panel--launcher">
          <div class="pill-strip-wrap">
            <div class="pill-strip" id="sectorPills" aria-label="Sektör kısayolları"></div>
          </div>
          <div class="app-grid" id="sectorGrid"></div>
        </div>
      </section>

      <section class="view view--projects hidden" id="viewProjects" aria-live="polite">
        <div class="glass-panel glass-panel--list">
          <div class="projects-head">
            <h2 class="projects-title" id="projectsTitle"></h2>
          </div>
          <ul class="project-list" id="projectList"></ul>
        </div>
      </section>
    </main>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
